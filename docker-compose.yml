version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: document_management
      POSTGRES_USER: dms_user
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms_user -d document_management"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://dms_user:1234@db:5432/document_management
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      FLASK_ENV: development
      FLASK_DEBUG: "0"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python -c "import models; models.initialize_database()" &&
        waitress-serve --host=0.0.0.0 --port=5000 wsgi:app

volumes:
  postgres_data:
  uploads:
